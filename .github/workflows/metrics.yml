name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: vedantdubey19
          template: classic
          base: header, activity, repositories, metadata
          plugin_languages: yes
          plugin_isocalendar: yes
          plugin_habits: yes
          plugin_lines: yes